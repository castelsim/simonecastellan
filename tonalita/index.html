<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Tonalità</title>
  <meta name="description" content="Carica un brano e prova note, accordi e scale sopra l'audio per trovare a orecchio la tonalità. Tastiera virtuale, Hold, scala maggiore e minore, tap tempo. Tutto nel browser." />
  <meta name="theme-color" content="#ffffff" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Tonalità" />
  <meta property="og:description" content="Prova note, accordi e scale sopra il tuo brano per trovare a orecchio la tonalità. Funziona nel browser." />
  <meta property="og:image" content="og-image.svg" />
  <meta property="og:locale" content="it_IT" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>Tonalità</h1>

    <!-- Carica audio -->
    <div class="upload">
      <input type="file" id="fileInput" class="file-input"
             accept="audio/*,.mp3,.wav,.aiff,.aif,.flac,.m4a,.ogg" />
      <label for="fileInput" class="btn btn-secondary upload-btn" id="uploadBtn">Carica audio</label>
      <span id="fileName" class="file-name"></span>
    </div>

    <!-- Player: play/pausa + avanzamento + volume -->
    <div id="player" class="player hidden">
      <div class="transport">
        <button type="button" id="playBtn" class="step play" aria-label="Play / Pausa">▶</button>
        <div class="pbar">
          <input type="range" id="seek" class="range" min="0" max="1000" value="0" step="1" aria-label="Avanzamento" />
          <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
        </div>
      </div>
      <div class="vol">
        <span class="vol-ic" aria-hidden="true">🔊</span>
        <input type="range" id="vol" class="range" min="0" max="100" value="100" step="1" aria-label="Volume" />
      </div>
    </div>

    <!-- Tastiera -->
    <div id="keyboard" class="keyboard"></div>

    <!-- Ottava -->
    <div class="ctrl-row">
      <span class="oct" role="group" aria-label="Ottava">
        <button type="button" id="octDown" class="step sm" aria-label="Ottava giù">−</button>
        <span id="octLabel" class="oct-label">Ott. 3</span>
        <button type="button" id="octUp" class="step sm" aria-label="Ottava su">+</button>
      </span>
    </div>

    <!-- Visualizzazione accordo -->
    <div class="seg modes" role="group" aria-label="Mostra accordo">
      <button type="button" class="seg-btn" data-chord="major">Maggiore</button>
      <button type="button" class="seg-btn" data-chord="minor">Minore</button>
    </div>

    <!-- Stop -->
    <div class="ctrl-row">
      <button type="button" id="stopBtn" class="btn btn-secondary">Stop</button>
    </div>
  </main>

  <footer class="site-footer">
    Designed and built by <a href="https://simonecastellan.com" target="_blank" rel="noopener">Simone Castellan</a>
  </footer>

  <audio id="audio" preload="metadata"></audio>

  <script src="script.js"></script>
</body>
</html>
