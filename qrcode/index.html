<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QR Code</title>
  <meta name="description" content="Genera un QR code da qualsiasi testo, in locale nel tuo browser. Nessun account, nessun tracciamento." />
  <meta name="theme-color" content="#ffffff" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="QR Code" />
  <meta property="og:description" content="Genera un QR code da qualsiasi testo, in locale nel tuo browser." />
  <meta property="og:locale" content="it" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>QR Code</h1>
    <p class="subtitle">Genera un QR code da qualsiasi testo.</p>

    <!-- Preview — bordo sempre visibile -->
    <div class="preview" id="preview">
      <canvas id="canvas" class="hidden"></canvas>
      <span class="empty-icon" id="emptyIcon" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="22" height="22" rx="3" stroke="currentColor" stroke-width="3"/>
          <rect x="10" y="10" width="10" height="10" rx="1" fill="currentColor"/>
          <rect x="38" y="4" width="22" height="22" rx="3" stroke="currentColor" stroke-width="3"/>
          <rect x="44" y="10" width="10" height="10" rx="1" fill="currentColor"/>
          <rect x="4" y="38" width="22" height="22" rx="3" stroke="currentColor" stroke-width="3"/>
          <rect x="10" y="44" width="10" height="10" rx="1" fill="currentColor"/>
          <rect x="38" y="38" width="5" height="5" rx="1" fill="currentColor"/>
          <rect x="47" y="38" width="5" height="5" rx="1" fill="currentColor"/>
          <rect x="56" y="38" width="5" height="5" rx="1" fill="currentColor"/>
          <rect x="38" y="47" width="5" height="5" rx="1" fill="currentColor"/>
          <rect x="47" y="47" width="5" height="5" rx="1" fill="currentColor"/>
          <rect x="56" y="56" width="5" height="5" rx="1" fill="currentColor"/>
          <rect x="38" y="56" width="5" height="5" rx="1" fill="currentColor"/>
        </svg>
      </span>
    </div>
    <p class="note" id="note"></p>

    <!-- Azioni -->
    <div class="actions">
      <button class="btn btn-secondary" id="btnPng" disabled>PNG</button>
      <button class="btn btn-secondary" id="btnSvg" disabled>SVG</button>
      <button class="btn btn-secondary" id="btnCopy" disabled>Copia</button>
    </div>

    <!-- Input -->
    <div class="input-wrap">
      <textarea id="textInput" placeholder="https://example.com" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    </div>

    <!-- Suggerimento tipo rilevato -->
    <div class="hint" id="hint" hidden>
      <span id="hintLabel"></span>
      <button class="hint-btn" id="hintBtn" hidden></button>
    </div>
  </main>

  <footer class="site-footer">
    Designed and built by <a href="https://simonecastellan.com" target="_blank" rel="noopener">Simone Castellan</a>
  </footer>

  <script src="qrcode.min.js"></script>
  <script>
  (function () {
    if (window.qrcode && qrcode.stringToBytesFuncs["UTF-8"])
      qrcode.stringToBytes = qrcode.stringToBytesFuncs["UTF-8"];

    var $ = function (id) { return document.getElementById(id); };
    var MARGIN = 4, currentQR = null;
    var canvas = $("canvas"), preview = $("preview"), emptyIcon = $("emptyIcon"), note = $("note");
    var btnPng = $("btnPng"), btnSvg = $("btnSvg"), btnCopy = $("btnCopy");

    function setActions(on) { btnPng.disabled = !on; btnSvg.disabled = !on; btnCopy.disabled = !on; }
    function setNote(msg, err) { note.textContent = msg || ""; note.classList.toggle("error", !!err); }

    function update() {
      var text = $("textInput").value.trim();
      if (!text) {
        currentQR = null;
        canvas.classList.add("hidden"); emptyIcon.classList.remove("hidden");
        preview.classList.remove("has-qr");
        setActions(false); setNote(""); return;
      }
      var qr;
      try { qr = qrcode(0, "M"); qr.addData(text); qr.make(); }
      catch (e) { setNote("Troppo testo — accorcialo.", true); setActions(false); return; }
      currentQR = qr;
      draw(qr);
      canvas.classList.remove("hidden"); emptyIcon.classList.add("hidden");
      preview.classList.add("has-qr");
      setActions(true); setNote("");
    }

    function draw(qr) {
      var count = qr.getModuleCount(), total = count + MARGIN * 2;
      var cell = Math.max(1, Math.floor(512 / total)), dim = total * cell;
      canvas.width = dim; canvas.height = dim;
      var ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, dim, dim);
      ctx.fillStyle = "#1a1a1a";
      for (var r = 0; r < count; r++)
        for (var c = 0; c < count; c++)
          if (qr.isDark(r, c)) ctx.fillRect((c + MARGIN) * cell, (r + MARGIN) * cell, cell, cell);
    }

    function toSVG(qr) {
      var count = qr.getModuleCount(), cell = 10, total = count + MARGIN * 2, dim = total * cell, rects = "";
      for (var r = 0; r < count; r++)
        for (var c = 0; c < count; c++)
          if (qr.isDark(r, c))
            rects += '<rect x="'+(c+MARGIN)*cell+'" y="'+(r+MARGIN)*cell+'" width="'+cell+'" height="'+cell+'"/>';
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+dim+' '+dim+'" shape-rendering="crispEdges">' +
             '<rect width="100%" height="100%" fill="#fff"/><g fill="#1a1a1a">'+rects+'</g></svg>';
    }

    function download(blob, name) {
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob); a.download = name;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
    }

    // ---- Rilevamento tipo probabilistico -----------------------------------
    var DETECTORS = [
      {
        test: function (t) {
          return /^[^\s@]+@[^\s@]+\.[a-z]{2,}$/i.test(t) ? 0.95 : 0;
        },
        label: 'Sembra un\'email',
        action: 'Formatta come mailto:',
        format: function (t) { return 'mailto:' + t; }
      },
      {
        test: function (t) {
          // Già ha schema o @ → non è un telefono
          if (/^[a-z]+:/i.test(t) || t.indexOf('@') !== -1) return 0;
          var clean = t.replace(/[\s\-\(\)\.]/g, '').replace(/^\+/, '');
          return /^\d{7,15}$/.test(clean) && /^[+\d\s\-\(\)\.]+$/.test(t) ? 0.80 : 0;
        },
        label: 'Sembra un numero di telefono',
        action: 'Formatta come tel:',
        format: function (t) {
          var d = t.replace(/[\s\-\(\)\.]/g, '');
          if (d.charAt(0) !== '+') d = '+' + d;
          return 'tel:' + d;
        }
      },
      {
        test: function (t) {
          // Già ha schema → non serve
          if (/^[a-z][a-z0-9+\-.]*:/i.test(t)) return 0;
          if (t.indexOf('@') !== -1) return 0;
          return /^(www\.)?[\w\-]+\.([a-z]{2,})([/?#]|$)/i.test(t) ? 0.85 : 0;
        },
        label: 'Manca https://',
        action: 'Aggiungi https://',
        format: function (t) { return 'https://' + t; }
      },
      {
        test: function (t) {
          return /^-?\d{1,3}\.\d+,\s*-?\d{1,3}\.\d+$/.test(t.trim()) ? 0.95 : 0;
        },
        label: 'Sembrano coordinate',
        action: 'Apri in Maps',
        format: function (t) {
          return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(t.trim());
        }
      },
      {
        test: function (t) {
          if (t.length < 8) return 0;
          return /\b(via|piazza|corso|viale|vicolo|largo|street|avenue|road|blvd|square|rue|straße|calle)\b/i.test(t) ? 0.78 : 0;
        },
        label: 'Sembra un indirizzo',
        action: 'Apri in Maps',
        format: function (t) {
          return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(t.trim());
        }
      },
      {
        test: function (t) {
          if (/^WIFI:/i.test(t)) return 0;
          return /\b(wifi|wi-fi|ssid|password|rete)\b/i.test(t) ? 0.70 : 0;
        },
        label: 'Wi-Fi? Formato: WIFI:T:WPA;S:nome;P:password;;',
        action: null,
        format: null
      }
    ];

    var hintEl = $("hint"), hintLabel = $("hintLabel"), hintBtn = $("hintBtn");
    var pendingFormat = null;

    function detect(text) {
      var best = null, bestScore = 0;
      DETECTORS.forEach(function (d) {
        var score = d.test(text);
        if (score > bestScore) { bestScore = score; best = d; }
      });
      return (best && bestScore >= 0.70) ? best : null;
    }

    function updateHint(text) {
      var d = text ? detect(text) : null;
      if (!d) { hintEl.hidden = true; pendingFormat = null; return; }
      hintLabel.textContent = d.label;
      if (d.action && d.format) {
        hintBtn.textContent = d.action + ' →';
        hintBtn.hidden = false;
        pendingFormat = d.format;
      } else {
        hintBtn.hidden = true;
        pendingFormat = null;
      }
      hintEl.hidden = false;
    }

    hintBtn.addEventListener("click", function () {
      if (!pendingFormat) return;
      var input = $("textInput");
      input.value = pendingFormat(input.value.trim());
      hintEl.hidden = true;
      pendingFormat = null;
      update();
    });
    // ---- Fine rilevamento ------------------------------------------------

    $("textInput").addEventListener("input", function () {
      update();
      updateHint($("textInput").value.trim());
    });

    btnPng.addEventListener("click", function () {
      if (!currentQR) return;
      canvas.toBlob(function (b) { download(b, "qr-code.png"); }, "image/png");
    });
    btnSvg.addEventListener("click", function () {
      if (!currentQR) return;
      download(new Blob([toSVG(currentQR)], { type: "image/svg+xml" }), "qr-code.svg");
    });
    btnCopy.addEventListener("click", function () {
      if (!currentQR || !navigator.clipboard || !window.ClipboardItem) {
        setNote("Copia non supportata — usa PNG.", true); return;
      }
      canvas.toBlob(function (b) {
        navigator.clipboard.write([new ClipboardItem({ "image/png": b })])
          .then(function () { setNote("Copiato."); setTimeout(function () { setNote(""); }, 2000); })
          .catch(function () { setNote("Impossibile copiare — usa PNG.", true); });
      }, "image/png");
    });
  })();
  </script>
</body>
</html>
